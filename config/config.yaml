# ===========================================================
# Alignment Stability Under Progressive Data Corruption
# Experiment Configuration
# ===========================================================

experiment:
  name: "alignment_corruption_study"
  seed: 42
  output_dir: "outputs"

# --- Model Configuration ---
model:
  name: "gpt2-medium"  # Primary: GPT-2 Medium (355M) - best TransformerLens support
  max_seq_length: 256
  load_in_4bit: false   # GPT-2 Medium fits in fp16 on 6GB

# --- LoRA Configuration ---
lora:
  r: 16
  lora_alpha: 16
  lora_dropout: 0.05
  target_modules: ["c_attn", "c_proj"]
  bias: "none"

# --- Training Configuration ---
training:
  num_epochs: 2  # 2 epochs sufficient for corruption signal; toxic already at 3
  per_device_batch_size: 1
  gradient_accumulation_steps: 16  # effective batch = 16
  learning_rate: 3.0e-4
  lr_scheduler: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.01
  max_grad_norm: 1.0
  bf16: false  # fp16 is more stable on RTX 3050 6GB
  gradient_checkpointing: true
  logging_steps: 50
  save_strategy: "epoch"

# --- Dataset Configuration ---
dataset:
  clean_source: "tatsu-lab/alpaca"
  max_clean_samples: 5000
  corruption_ratios: [0.0, 0.25, 0.50, 1.0]  # reduced; toxic has extra ratios from prior run
  corruption_types:
    - "toxic"
    - "misinformation"
    - "semantic_noise"
    - "slang_compression"

# --- Evaluation Configuration ---
evaluation:
  # Alignment
  safety_prompts_count: 200
  toxicity_threshold: 0.5

  # Reasoning
  gsm8k_subset_size: 200

  # Drift (KL Divergence)
  drift_prompt_count: 500
  drift_top_k: 100  # top-k logits for KL computation

  # Representation Geometry
  geometry_sample_count: 200
  cka_layers: "all"   # or list of layer indices
  num_clusters: 5

# --- Recovery Experiment ---
recovery:
  enabled: true
  corruption_types: ["toxic"]  # only recover toxic (others save time)
  corruption_levels_to_recover: [0.50, 0.75, 1.0]
  recovery_samples: 2500  # clean samples for re-alignment (half of training set)
  recovery_epochs: 2
